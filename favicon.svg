<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Fondo oscuro estético que combina con el estilo de tu estudio -->
  <rect width="512" height="512" rx="100" fill="#111111"/>
  
  <!-- Borde sutil metálico/oscuro -->
  <rect x="10" y="10" width="492" height="492" rx="90" fill="none" stroke="#222222" stroke-width="20"/>
  
  <!-- Iniciales JZ con tipografía imponente y limpia -->
  <text x="50%" y="55%" 
        font-family="'Bebas Neue', 'Rajdhani', 'Arial Black', sans-serif" 
        font-size="240" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        letter-spacing="5">
    J<tspan fill="#e50914">Z</tspan>
  </text>
</svg>
